<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Магазинчик Ями</title>
  <meta name="description" content="Магазинчик Ями - заказывай контент за баллы или рубли."/>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    :root{
      --gold1:#f6e7a6; --gold2:#e7bf2b; --gold3:#c9961d;
      --shadow2:0 12px 34px rgba(10,20,80,.14);
    }
    html,body{height:100%;}
    body{
      overflow-x:hidden;
      background:
        radial-gradient(900px 600px at 18% 14%,rgba(255,255,255,.10),transparent 62%),
        radial-gradient(800px 520px at 82% 22%,rgba(255,255,255,.08),transparent 60%),
        linear-gradient(135deg,#f2b6da 0%,#9ad0f0 52%,#cbbcff 100%);
      color:rgba(255,255,255,.94);
      font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    }
    .deep-modal{
      background:rgba(255,255,255,0.1);
      backdrop-filter:blur(24px);
      -webkit-backdrop-filter:blur(24px);
      border:1px solid rgba(255,255,255,0.2);
      box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .glass-card{
      background:rgba(255,255,255,0.06);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.12);
      transition:all .4s cubic-bezier(0.4,0,0.2,1);
    }
    .glass-card:hover{
      background:rgba(255,255,255,0.12);
      border-color:rgba(255,255,255,0.25);
      transform:translateY(-4px);
    }
    .btn-gold{
      background:linear-gradient(135deg,var(--gold1),var(--gold2));
      color:#4a3900;
      font-weight:700;
      transition:all .3s ease;
      box-shadow:0 4px 15px rgba(231,191,43,0.3);
    }
    .btn-gold:hover{
      transform:scale(1.05);
      box-shadow:0 6px 20px rgba(231,191,43,0.5);
    }
    .btn-gold:active{transform:scale(0.98);}
    .sakura-petal{
      position:fixed; top:-10%; pointer-events:none; z-index:10;
      animation:fall linear infinite;
    }
    @keyframes fall{
      0%{transform:translateY(0) rotate(0deg); opacity:0;}
      10%{opacity:1;}
      90%{opacity:1;}
      100%{transform:translateY(110vh) rotate(360deg); opacity:0;}
    }
    ::-webkit-scrollbar{width:8px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2); border-radius:10px;}
    ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.3);}
  </style>
</head>
<body class="min-h-screen text-slate-100 selection:bg-pink-300 selection:text-pink-900">

  <div id="sakura-container" class="fixed inset-0 pointer-events-none overflow-hidden select-none"></div>

  <nav class="sticky top-0 z-40 w-full glass-card border-none rounded-none bg-white/5 backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3 group cursor-pointer" onclick="location.reload()">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-pink-400 to-blue-400 flex items-center justify-center shadow-lg group-hover:rotate-12 transition-transform">
          <span class="text-white font-bold text-xl">Y</span>
        </div>
        <span class="font-black text-xl tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-white/70">YAMI SHOP</span>
      </div>
      <div class="flex items-center gap-4">
        <div id="authArea" class="flex items-center gap-4"></div>
        <button id="btnOpenTop" class="glass-card px-4 py-2 rounded-xl text-sm font-semibold hover:bg-white/10 flex items-center gap-2">
          🏆 ТОП
        </button>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-12 relative z-10">
    <header class="text-center mb-16 space-y-4">
      <h1 class="text-5xl md:text-7xl font-black tracking-tighter">
        МАГАЗИНЧИК <span class="bg-clip-text text-transparent bg-gradient-to-r from-pink-300 to-blue-300">ЯМИ</span>
      </h1>
      <p class="text-lg text-white/60 max-w-2xl mx-auto font-medium">
        Заказывай уникальный контент, музыку или испытания за баллы канала и рубли.
      </p>
    </header>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="itemsGrid"></div>
  </main>

  <div id="choiceModal" class="fixed inset-0 z-50 hidden overflow-y-auto">
    <div id="choiceOverlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm" data-close="1"></div>
    <div class="flex min-h-full items-center justify-center p-4 py-6">
      <div id="choiceInner" class="relative deep-modal w-full max-w-lg rounded-3xl p-6 sm:p-8">
        <button class="absolute top-5 right-5 text-white/40 hover:text-white transition-colors" data-close="1">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
        <div id="choiceContent" class="space-y-6"></div>
      </div>
    </div>
  </div>

  <div id="payModal" class="fixed inset-0 z-[60] hidden overflow-y-auto">
    <div id="payOverlay" class="fixed inset-0 bg-black/65 backdrop-blur-sm" data-close-pay="1"></div>
    <div class="flex min-h-full items-center justify-center p-4 py-10">
      <div class="relative deep-modal w-full max-w-md rounded-3xl p-6 sm:p-8" style="border-color:rgba(231,191,43,.35);">
        <button class="absolute top-5 right-5 text-white/40 hover:text-white" data-close-pay="1">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
        <div id="payModalContent"></div>
      </div>
    </div>
  </div>

  <div id="topModal" class="fixed inset-0 z-50 hidden">
    <div id="topOverlay" class="absolute inset-0 bg-black/70 backdrop-blur-md" data-close-top="1"></div>
    <div class="relative flex items-center justify-center min-h-screen px-4 py-10">
      <div class="deep-modal w-full max-w-4xl rounded-3xl flex flex-col max-h-[85vh] overflow-hidden">
        <div class="p-6 border-b border-white/10 flex items-center justify-between shrink-0">
          <h2 class="text-2xl font-bold flex items-center gap-3">
            <span class="text-3xl">🏆</span> Зал Славы
          </h2>
          <button class="p-2 hover:bg-white/10 rounded-xl transition-colors" data-close-top="1">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        
        <div class="p-6 bg-white/5 border-b border-white/10 shrink-0">
          <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
            <div class="relative w-full md:w-64">
              <input type="text" id="topSearch" placeholder="Поиск по нику..." class="w-full bg-black/20 border border-white/10 rounded-xl py-2 px-4 focus:ring-2 focus:ring-pink-400 outline-none">
            </div>
            <div class="flex gap-2 w-full md:w-auto">
              <select id="topSort" class="bg-black/20 border border-white/10 rounded-xl py-2 px-4 outline-none flex-1 md:flex-none">
                <option value="points">Баллы</option>
                <option value="donates">Донаты</option>
              </select>
              <button id="btnShowMe" class="btn-gold px-4 py-2 rounded-xl text-sm">Где я?</button>
            </div>
          </div>
        </div>

        <div class="overflow-y-auto flex-1 p-2 sm:p-6" id="topScrollContainer">
          <div id="topStatus" class="text-center text-white/40 mb-4 text-sm"></div>
          <table class="w-full border-separate border-spacing-y-2">
            <thead>
              <tr class="text-left text-white/40 text-xs uppercase tracking-wider">
                <th class="px-4 pb-2">Ранг</th>
                <th class="px-4 pb-2">Стример / Ник</th>
                <th class="px-4 pb-2 text-right">Поинты</th>
                <th class="px-4 pb-2 text-right">Донаты</th>
              </tr>
            </thead>
            <tbody id="topTbody"></tbody>
          </table>
          <div id="btnLoadTopContainer" class="mt-8 text-center hidden">
             <button id="btnLoadTop" class="glass-card px-8 py-3 rounded-2xl hover:bg-white/10 font-bold transition-all">Загрузить еще</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="max-w-7xl mx-auto px-4 py-12 mt-12 border-t border-white/10 relative z-10">
    <div class="flex flex-col md:flex-row items-center justify-between gap-8">
      <div class="text-center md:text-left">
        <p class="text-white/40 text-sm font-medium">© 2024 YAMI SHOP. Создано для лучших зрителей.</p>
        <div class="mt-4 flex gap-4 justify-center md:justify-start">
          <a href="#" class="text-white/30 hover:text-pink-400 transition-colors">Twitch</a>
          <a href="#" class="text-white/30 hover:text-blue-400 transition-colors">Discord</a>
          <a href="#" class="text-white/30 hover:text-red-400 transition-colors">YouTube</a>
        </div>
      </div>
      <div class="flex gap-6">
        <button id="btnOpenTopFooter" class="text-white/40 hover:text-white transition-colors text-sm font-bold uppercase tracking-widest">Топ донатеров</button>
      </div>
    </div>
  </footer>

  <div id="toTop" class="fixed bottom-8 right-8 z-40 p-4 rounded-2xl glass-card cursor-pointer opacity-0 translate-y-10 transition-all duration-500 hover:bg-white/20">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/></svg>
  </div>

  <script>
    const CONFIG = {
      streamer: 'yami_cat',
      clientId: 'p1is2127x985tq2x2miv7s3e7qom7m',
      redirectUri: 'https://yamishop.ru',
      pointsPerRuble: 100,
      rewardId: 'd65e2607-ec20-410a-b28e-5b23d90f0581', 
      apiBase: 'https://yamishop.ru/api' 
    };

    const $ = s => document.querySelector(s);
    const setAuth = (d) => localStorage.setItem('yami_auth', JSON.stringify(d));
    const getAuth = () => JSON.parse(localStorage.getItem('yami_auth'));

    const SHOP_ITEMS = [
      { id:1, title:'Выбор Музыки', costPoints:5000, costRub:50, icon:'🎵', desc:'Поставлю твой трек на стрим (без авторских прав).' },
      { id:2, title:'Сигна', costPoints:10000, costRub:100, icon:'📝', desc:'Фото-сигна с твоим ником от Ями.' },
      { id:3, title:'VIP Статус', costPoints:100000, costRub:500, icon:'💎', desc:'Стань VIP зрителем на целый месяц!' },
      { id:4, title:'ASMR Привет', costPoints:15000, costRub:150, icon:'🎙️', desc:'Шепотом поприветствую тебя лично.' },
      { id:5, title:'Выбор Игры', costPoints:500000, costRub:5000, icon:'🎮', desc:'Я поиграю в выбранную тобой игру (до 2 часов).' },
      { id:6, title:'Роспись в профиле', costPoints:7000, costRub:70, icon:'🖋️', desc:'Оставлю комментарий в твоем Steam/VK.' },
      { id:7, title:'Танцы в костюме', costPoints:200000, costRub:2000, icon:'💃', desc:'Спец-танец в тематическом образе.' },
      { id:8, title:'Разбан', costPoints:50000, costRub:1000, icon:'🔓', desc:'Второй шанс для тех, кто осознал вину.' }
    ];

    let currentItem = null;
    let topState = { data:[], page:1, sort:'points', query:'', hasMore:true };

    function init(){
      renderGrid();
      updateAuthArea();
      createSakura();
      
      window.addEventListener('scroll', () => {
        const btn = $('#toTop');
        if(window.scrollY > 500){
          btn.classList.replace('opacity-0', 'opacity-100');
          btn.classList.replace('translate-y-10', 'translate-y-0');
        } else {
          btn.classList.replace('opacity-100', 'opacity-0');
          btn.classList.replace('translate-y-0', 'translate-y-10');
        }
      });
    }

    function createSakura(){
      const container = $('#sakura-container');
      const count = 15;
      for(let i=0; i<count; i++){
        const petal = document.createElement('div');
        petal.className = 'sakura-petal';
        petal.innerHTML = `<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2C10 2 13 6 16 9C19 12 17 17 13 18C9 19 8 16 8 16C8 16 7 19 3 18C-1 17 -1 12 2 9C5 6 10 2 10 2Z" fill="#ffb7d5" opacity="0.6"/></svg>`;
        petal.style.left = Math.random() * 100 + 'vw';
        petal.style.animationDuration = (Math.random() * 5 + 5) + 's';
        petal.style.animationDelay = (Math.random() * 10) + 's';
        container.appendChild(petal);
      }
    }

    function updateAuthArea(){
      const auth = getAuth();
      const area = $('#authArea');
      if(auth && auth.login){
        area.innerHTML = `
          <div class="flex items-center gap-3 glass-card px-3 py-1.5 rounded-2xl">
            <img src="${auth.avatar}" class="w-8 h-8 rounded-full border border-pink-400/50">
            <span class="font-bold text-sm hidden sm:inline">${auth.login}</span>
            <button onclick="logout()" class="text-white/40 hover:text-red-400 p-1 transition-colors">
               <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            </button>
          </div>
        `;
      } else {
        area.innerHTML = `
          <button onclick="login()" class="btn-gold px-6 py-2 rounded-xl text-sm flex items-center gap-2">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0h1.714v5.143h-1.714zm-10.287 0h1.714v5.143H6.002zm1.715 14.573l-1.143-1.144 1.143-1.142h1.715l-1.143 1.142 1.143 1.144zm0-4.286l-1.143-1.143 1.143-1.143h1.715l-1.143 1.143 1.143 1.143zm1.714 0h1.715v1.715H9.431v-1.715zm1.715 0h1.714v1.715h-1.714v-1.715zm1.714 0h1.715v1.715h-1.715v-1.715zM4.286 2.143v16.285l4.286 4.286h11.143V2.143H4.286zm12.857 12h-1.714v1.715h1.714v-1.715zm0-2.572h-1.714v1.715h1.714v-1.715zm0-2.571h-1.714v1.714h1.714V9zm0-2.572h-1.714V8.143h1.714V6.429z"/></svg>
            Войти
          </button>
        `;
      }
    }

    function login(){
      const scope = encodeURIComponent('channel:read:redemptions user:read:email');
      window.location.href = `https://id.twitch.tv/oauth2/authorize?client_id=${CONFIG.clientId}&redirect_uri=${CONFIG.redirectUri}&response_type=token&scope=${scope}`;
    }

    function logout(){ localStorage.removeItem('yami_auth'); location.reload(); }

    const hash = window.location.hash;
    if(hash.includes('access_token')){
      const token = new URLSearchParams(hash.substring(1)).get('access_token');
      if(token){
        fetch('https://api.twitch.tv/helix/users', { headers: { 'Authorization': `Bearer ${token}`, 'Client-Id': CONFIG.clientId } })
          .then(r=>r.json()).then(d=>{
            const u = d.data[0];
            setAuth({ token, login:u.display_name, avatar:u.profile_image_url, id:u.id });
            window.history.replaceState({}, document.title, "/");
            updateAuthArea();
          });
      }
    }

    function renderGrid(){
      $('#itemsGrid').innerHTML = SHOP_ITEMS.map(it => `
        <div class="glass-card rounded-3xl p-6 flex flex-col group relative overflow-hidden">
          <div class="absolute -right-4 -top-4 text-7xl opacity-5 group-hover:scale-110 transition-transform">${it.icon}</div>
          <div class="mb-6 w-14 h-14 bg-white/5 rounded-2xl flex items-center justify-center text-3xl shadow-inner">${it.icon}</div>
          <h3 class="text-xl font-black mb-2">${it.title}</h3>
          <p class="text-white/50 text-sm mb-6 flex-grow leading-relaxed">${it.desc}</p>
          <div class="space-y-3">
            <button onclick="openChoice(${it.id})" class="w-full btn-gold py-3 rounded-xl text-sm uppercase tracking-wider">Выбрать</button>
          </div>
        </div>
      `).join('');
    }

    function openChoice(id){
      currentItem = SHOP_ITEMS.find(x=>x.id===id);
      const auth = getAuth();
      const cont = $('#choiceContent');
      
      let pointsBtn = `<div class="bg-red-500/10 border border-red-500/20 rounded-2xl p-4 text-center">
        <p class="text-red-400 text-xs font-bold uppercase mb-1">Недоступно</p>
        <button onclick="login()" class="text-white hover:underline text-sm font-bold">Войди, чтобы тратить баллы</button>
      </div>`;

      if(auth) {
        pointsBtn = `
          <button onclick="buyPoints()" class="w-full glass-card hover:bg-white/10 p-5 rounded-2xl flex items-center justify-between group">
            <div class="text-left">
              <span class="block text-xs font-bold text-pink-400 uppercase mb-1">Баллы канала</span>
              <span class="text-2xl font-black">${currentItem.costPoints.toLocaleString()}</span>
            </div>
            <div class="w-12 h-12 rounded-xl bg-pink-500/20 flex items-center justify-center group-hover:scale-110 transition-transform">🌸</div>
          </button>
        `;
      }

      cont.innerHTML = `
        <div class="text-center space-y-3 mb-8">
          <div class="w-20 h-20 bg-white/5 rounded-3xl flex items-center justify-center text-4xl mx-auto shadow-xl">${currentItem.icon}</div>
          <h2 class="text-3xl font-black tracking-tight">${currentItem.title}</h2>
          <p class="text-white/40 text-sm px-4">${currentItem.desc}</p>
        </div>
        
        <div class="space-y-4">
          ${pointsBtn}

          <button onclick="buyRub()" class="w-full glass-card border-yellow-500/30 hover:bg-yellow-500/5 p-5 rounded-2xl flex items-center justify-between group">
            <div class="text-left">
              <span class="block text-xs font-bold text-yellow-500 uppercase mb-1">Поддержать рублём</span>
              <span class="text-2xl font-black">${currentItem.costRub} ₽</span>
            </div>
            <div class="w-12 h-12 rounded-xl bg-yellow-500/20 flex items-center justify-center group-hover:scale-110 transition-transform">💳</div>
          </button>
        </div>

        <p class="text-[10px] text-center text-white/20 uppercase tracking-widest mt-8">Все транзакции защищены и поддерживают стримера</p>
      `;
      $('#choiceModal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeChoice(){ 
      $('#choiceModal').classList.add('hidden'); 
      document.body.style.overflow = '';
    }

    function buyPoints(){
      alert('Инструкция:\n1. Зайди на стрим\n2. Открой магазин баллов Twitch\n3. Найди награду "'+currentItem.title+'"\n4. Нажми купить!');
    }

    function buyRub(){
      const amount = currentItem.costRub;
      const desc = encodeURIComponent(`Заказ: ${currentItem.title}`);
      
      $('#payModalContent').innerHTML = `
        <div class="text-center space-y-6">
          <div class="space-y-2">
            <h3 class="text-2xl font-black">Оплата заказа</h3>
            <p class="text-white/40 text-sm">Сканируй QR в приложении банка</p>
          </div>
          
          <div class="bg-white p-4 rounded-3xl inline-block shadow-2xl shadow-yellow-500/10">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=https://yamishop.ru/pay?amount=${amount}" class="w-52 h-52">
          </div>

          <div class="glass-card p-4 rounded-2xl flex justify-between items-center">
            <span class="text-sm font-bold opacity-60">Сумма к оплате</span>
            <span class="text-xl font-black text-yellow-500">${amount} ₽</span>
          </div>

          <button onclick="closePayModal()" class="w-full btn-gold py-4 rounded-2xl text-sm uppercase tracking-widest font-bold">Я оплатил</button>
        </div>
      `;
      $('#choiceModal').classList.add('hidden');
      $('#payModal').classList.remove('hidden');
    }

    function closePayModal(){ 
      $('#payModal').classList.add('hidden'); 
      document.body.style.overflow = '';
    }

    function openTop(){
      $('#topModal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
      if(topState.data.length===0) loadTop();
    }
    function closeTop(){ 
      $('#topModal').classList.add('hidden'); 
      document.body.style.overflow = '';
    }

    async function loadTop(){
      const status = $('#topStatus');
      status.textContent = 'Загрузка...';
      
      // Имитация данных
      setTimeout(() => {
        const mockNames = ['GlitchMaster', 'CyberCat', 'Yami_Fan', 'PixelQueen', 'StarWalker', 'MoonLight', 'RogueBot', 'CoffeeDev'];
        const newData = Array.from({length:15}, (_, i) => ({
          nick: mockNames[Math.floor(Math.random()*mockNames.length)] + (topState.data.length + i),
          points: Math.floor(Math.random()*500000),
          donates: Math.floor(Math.random()*10000)
        }));
        
        topState.data = [...topState.data, ...newData];
        renderTop();
        status.textContent = '';
      }, 800);
    }

    function normNick(s){ return (s||'').toLowerCase().replace('@','').trim(); }

    function renderTop(){
      let list = [...topState.data];
      if(topState.query) {
        const q = normNick(topState.query);
        list = list.filter(x => normNick(x.nick).includes(q));
      }
      list.sort((a,b) => b[topState.sort] - a[topState.sort]);

      $('#topTbody').innerHTML = list.map((x, i) => {
        const isMe = getAuth()?.login && normNick(getAuth().login) === normNick(x.nick);
        let rankClass = "text-white/40";
        if(i===0) rankClass = "text-yellow-400 font-black text-xl";
        if(i===1) rankClass = "text-slate-300 font-bold text-lg";
        if(i===2) rankClass = "text-orange-400 font-bold";

        return `
          <tr class="group hover:bg-white/5 transition-colors ${isMe?'bg-pink-500/10':''}" data-nick="${normNick(x.nick)}">
            <td class="px-4 py-3 rounded-l-xl ${rankClass}">${i+1}</td>
            <td class="px-4 py-3 font-bold">${x.nick}</td>
            <td class="px-4 py-3 text-right font-mono text-pink-300">${x.points.toLocaleString()}</td>
            <td class="px-4 py-3 text-right font-mono text-yellow-400 rounded-r-xl">${x.donates.toLocaleString()} ₽</td>
          </tr>
        `;
      }).join('');
    }

    // Слушатели событий
    document.addEventListener('DOMContentLoaded', init);

    $('#choiceModal')?.addEventListener('click', e=>{ if(e.target?.getAttribute?.('data-close')==='1') closeChoice(); });
    $('#payModal')?.addEventListener('click', e=>{ if(e.target?.getAttribute?.('data-close-pay')==='1') closePayModal(); });

    $('#btnOpenTop')?.addEventListener('click',openTop);
    $('#btnOpenTopFooter')?.addEventListener('click',openTop);
    $('#btnLoadTop')?.addEventListener('click',loadTop);
    $('#topSearch')?.addEventListener('input',e=>{ topState.query=e.target.value||''; renderTop(); });
    $('#topSort')?.addEventListener('change',e=>{ topState.sort=e.target.value||'points'; renderTop(); });
    
    $('#btnShowMe')?.addEventListener('click',()=>{ 
      const me=normNick(getAuth()?.login||''); 
      if(!me){ $('#topStatus').textContent='Войди через Twitch.'; return; } 
      const row=$(`#topTbody tr[data-nick="${CSS.escape(me)}"]`); 
      if(row) row.scrollIntoView({behavior:'smooth',block:'center'}); 
      else $('#topStatus').textContent='Тебя нет в топ-50.'; 
    });

    $('#topModal')?.addEventListener('click',e=>{ if(e.target?.getAttribute?.('data-close-top')==='1') closeTop(); });
    $('#toTop')?.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));

    document.addEventListener('keydown',e=>{
      if(e.key!=='Escape') return;
      closeChoice();
      closePayModal();
      closeTop();
    });

  </script>
</body>
</html>
